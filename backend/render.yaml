services:
  - type: web
    name: healthfirst-whatsapp-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        value: healthfirst_webhook_secret_2024
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DEV_MODE
        value: false
